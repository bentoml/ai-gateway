name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to (re-)release, e.g. v0.5.0-dev.g4ac597da
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write   # for GitHub Release creation

env:
  OCI_REGISTRY: quay.io/bentoml

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Package helm charts at release version
        run: |
          mkdir -p /tmp/helm-packages
          rm -f /tmp/helm-packages/ai-gateway-helm-*.tgz
          make helm-package \
            TAG="${{ steps.tag.outputs.value }}" \
            HELM_CHART_VERSION="${{ steps.tag.outputs.value }}" \
            OUTPUT_DIR=/tmp/helm-packages

      - uses: actions/upload-artifact@v4
        with:
          name: helm-packages
          path: /tmp/helm-packages/ai-gateway-helm-${{ steps.tag.outputs.value }}.tgz
          retention-days: 30
          if-no-files-found: error

  images:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        image: [controller, extproc]
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push per-arch image
        run: |
          make docker-build.${{ matrix.image }} \
            OCI_REGISTRY="${{ env.OCI_REGISTRY }}" \
            TAG="${{ needs.preflight.outputs.tag }}-${{ matrix.arch }}" \
            DOCKER_BUILD_ARGS="--push"

  image-manifest:
    needs: [preflight, images]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [controller, extproc]
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Compose multi-arch manifest list
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          IMG: ${{ env.OCI_REGISTRY }}/ai-gateway-${{ matrix.image }}
        run: |
          docker buildx imagetools create -t "${IMG}:${TAG}" \
            "${IMG}:${TAG}-amd64" \
            "${IMG}:${TAG}-arm64"
          docker buildx imagetools inspect "${IMG}:${TAG}"

  chart:
    needs: [preflight, image-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: helm-packages
          path: /tmp/helm-packages

      - uses: azure/setup-helm@v4

      - name: Clone helm-charts-private (gh-pages)
        uses: actions/checkout@v4
        with:
          repository: bentoml/helm-charts-private
          ref: gh-pages
          ssh-key: ${{ secrets.HELM_CHARTS_DEPLOY_KEY }}
          path: charts-pages

      - name: Copy chart + regenerate index
        working-directory: charts-pages
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          cp "/tmp/helm-packages/ai-gateway-helm-${TAG}.tgz" packages/
          helm repo index . --merge index.yaml --url https://bentoml.github.io/helm-charts-private

      - name: Commit and push to gh-pages
        working-directory: charts-pages
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "packages/ai-gateway-helm-${TAG}.tgz" index.yaml
          git commit -m "Publish ai-gateway-helm ${TAG}"
          git push origin gh-pages

      - name: Wait for GitHub Pages to serve the new chart
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          url="https://bentoml.github.io/helm-charts-private/packages/ai-gateway-helm-${TAG}.tgz"
          for i in $(seq 1 12); do
            if curl -sSfI -o /dev/null "$url"; then
              echo "Chart available after $((i * 10))s: $url"
              exit 0
            fi
            sleep 10
          done
          echo "WARN: $url not reachable after 120s; Pages rebuild may still be pending"

  release-notes:
    needs: [preflight, image-manifest, chart]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Collect image manifest digests
        id: digests
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          for img in controller extproc; do
            digest=$(docker buildx imagetools inspect \
              "${{ env.OCI_REGISTRY }}/ai-gateway-${img}:${TAG}" \
              --format '{{json .Manifest.Digest}}' | tr -d '"')
            echo "${img}=${digest}" >> "$GITHUB_OUTPUT"
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.tag }}
          body: |
            ## Container images (multi-arch: linux/amd64 + linux/arm64)

            - `${{ env.OCI_REGISTRY }}/ai-gateway-controller:${{ needs.preflight.outputs.tag }}`
              @ `${{ steps.digests.outputs.controller }}`
            - `${{ env.OCI_REGISTRY }}/ai-gateway-extproc:${{ needs.preflight.outputs.tag }}`
              @ `${{ steps.digests.outputs.extproc }}`

            ## Helm chart

            - https://bentoml.github.io/helm-charts-private/packages/ai-gateway-helm-${{ needs.preflight.outputs.tag }}.tgz

            Install:
            ```yaml
            dependencies:
              - name: ai-gateway-helm
                version: ${{ needs.preflight.outputs.tag }}
                repository: https://bentoml.github.io/helm-charts-private
            ```
